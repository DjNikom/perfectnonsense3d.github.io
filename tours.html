<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TravelPro - Nasze Wycieczki</title>
<style>
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin:0; background: linear-gradient(135deg, #0b3d91, #1e90ff);}
header { padding:20px; background:#0b3d91; color:#fff; display:flex; justify-content:space-between; align-items:center;}
header nav a { color:#fff; margin:0 10px; text-decoration:none; font-weight:bold; transition:0.3s;}
header nav a:hover { color:#ffd700;}
.tour-section { padding:40px 20px; }
.tour-section h1 { text-align:center; color:black; margin-bottom:40px; }
.tour-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:30px; justify-items:center;}
.tour-card { width:100%; max-width:300px; background:#fff; border-radius:20px; overflow:hidden; box-shadow:0 12px 25px rgba(0,0,0,0.1); display:flex; flex-direction:column; transition:transform 0.3s, box-shadow 0.3s;}
.tour-card:hover { transform:translateY(-8px); box-shadow:0 20px 50px rgba(0,0,0,0.2);}
.tour-card img { width:100%; height:200px; object-fit:cover; }
.tour-card h3 { margin:15px; color:#0b3d91; font-size:20px; }
.tour-card p { margin:0 15px 10px 15px; color:#555; font-size:14px; }
.tour-card .price { font-weight:bold; margin:0 15px 15px 15px; color:#0b3d91; font-size:16px; }
.tour-card .btn-modern { margin:0 15px 20px 15px; padding:12px; border-radius:15px; background:linear-gradient(90deg,#0b3d91,#3a6fc5); color:#fff; font-weight:bold; cursor:pointer; border:none; transition:0.3s;}
.tour-card .btn-modern:hover { background:linear-gradient(90deg,#ffd700,#ff8c00); color:#0b3d91; }
/* Modal */
.modal { display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background-color:rgba(0,0,0,0.6);}
.modal-content { background:#fff; margin:100px auto; padding:30px; border-radius:20px; width:90%; max-width:500px; box-sizing:border-box;}
.modal-content h2 { margin-bottom:25px; color:#0b3d91; text-align:center; }
.modal-content input, .modal-content button { width:100%; max-width:100%; box-sizing:border-box; margin-bottom:15px; padding:12px 15px; border-radius:12px; border:1px solid #ccc; font-size:16px;}
.modal-content button { background:linear-gradient(90deg,#ffd700,#ff8c00); border:none; color:#0b3d91; font-weight:bold; cursor:pointer; transition:0.3s;}
.modal-content button:hover { background:linear-gradient(90deg,#ff8c00,#ffd700); color:#fff; }
.close { color:#aaa; float:right; font-size:28px; font-weight:bold; cursor:pointer; }
.close:hover { color:#0b3d91; }
@media(max-width:768px){ .tour-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
<h2>TravelPro</h2>
<nav>
<a href="index.html">Home</a>
<a href="tours.html">Tours</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="login.html">Login</a>
</nav>
</header>

<section class="tour-section">
<h1>Nasze Wycieczki</h1>
<div class="tour-grid" id="tourGrid"></div>
</section>

<!-- Modal Rezerwacji -->
<div id="bookingModal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h2>Rezerwacja wycieczki</h2>
    <form id="bookingForm">
      <input type="text" name="name" placeholder="Imię i nazwisko" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="tel" name="phone" placeholder="Telefon" required>
      <input type="number" name="people" placeholder="Liczba osób" min="1" required>
      <input type="date" name="date" required>
      <button type="submit">Zarezerwuj</button>
    </form>
    <p id="bookingStatus" style="text-align:center; font-weight:bold; color:green;"></p>
  </div>
</div>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
emailjs.init("BB2z8JtUKnhrghlIj"); // <-- Twój Public Key z EmailJS

const tourGrid = document.getElementById("tourGrid");
const modal = document.getElementById("bookingModal");
const closeBtn = document.querySelector(".close");
const bookingForm = document.getElementById("bookingForm");
const bookingStatus = document.getElementById("bookingStatus");

let tours = JSON.parse(localStorage.getItem("tours")) || [];

// Renderowanie wycieczek i przypisanie kliknięć do Rezerwuj
function renderTours() {
  tourGrid.innerHTML = "";
  if(tours.length===0){
    tourGrid.innerHTML = "<p style='text-align:center; color:#555;'>Brak wycieczek. Dodaj w panelu admina.</p>";
    return;
  }
  tours.forEach(tour=>{
    const card = document.createElement("div");
    card.className="tour-card";
    card.innerHTML=`
      <img src="${tour.image}" alt="${tour.title}">
      <h3>${tour.title}</h3>
      <p>${tour.description}</p>
      <p class="price">${tour.price} PLN</p>
      <button class="btn-modern">Rezerwuj</button>
    `;
    tourGrid.appendChild(card);
    const btn = card.querySelector(".btn-modern");
    btn.addEventListener("click", ()=>openBooking(tour.title));
  });
}

// Otwieranie modalu
function openBooking(tourTitle){
  modal.style.display="block";
  bookingForm.dataset.tour = tourTitle;
}

// Zamknięcie modalu
closeBtn.onclick = () => modal.style.display="none";
window.onclick = e => { if(e.target==modal) modal.style.display="none"; }

// Wysyłanie rezerwacji przez EmailJS
bookingForm.addEventListener("submit", e=>{
  e.preventDefault();
  const data = {
    tour: bookingForm.dataset.tour,
    name: bookingForm.name.value,
    email: bookingForm.email.value,
    phone: bookingForm.phone.value,
    people: bookingForm.people.value,
    date: bookingForm.date.value
  };

  // Wyślij maila przez EmailJS
  emailjs.send("service_x55q74a","template_fh69g3k", data)
    .then(() => {
      bookingStatus.style.color = "green";
      bookingStatus.textContent = `Rezerwacja dla ${data.tour} wysłana! Potwierdzenie otrzymasz na email.`;
      bookingForm.reset();
      modal.style.display="none";
    }, (error)=>{
      bookingStatus.style.color = "red";
      bookingStatus.textContent = "Błąd wysyłki. Spróbuj ponownie.";
      console.error(error);
    });

  // Opcjonalnie zapis do LocalStorage
  let reservations = JSON.parse(localStorage.getItem("reservations")) || [];
  reservations.push(data);
  localStorage.setItem("reservations", JSON.stringify(reservations));
});

document.addEventListener("DOMContentLoaded", renderTours);
</script>

</body>
</html>
